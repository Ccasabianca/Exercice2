services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    restart: unless-stopped
    environment:
      - MONGODB_URL=${MONGODB_URL}
      - HOST=0.0.0.0
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:'+process.env.PORT+'/ping').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  order-service:
    build: ./order-service
    container_name: order-service
    restart: unless-stopped
    environment:
      - MONGODB_URL=${MONGODB_URL}
      - HOST=0.0.0.0
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:'+process.env.PORT+'/ping').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  payment-service:
    build: ./payment-service
    container_name: payment-service
    restart: unless-stopped
    environment:
      - MONGODB_URL=${MONGODB_URL}
      - HOST=0.0.0.0
      - PORT=3002
    ports:
      - "3002:3002"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:'+process.env.PORT+'/ping').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: unless-stopped
    environment:
      - PORT=9001
      - INVENTORY_URL=${INVENTORY_URL}
      - ORDER_URL=${ORDER_URL}
      - PAYMENT_URL=${PAYMENT_URL}
    ports:
      - "9001:9001"
    depends_on:
      inventory-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    networks:
      - app-net

  bookstore:
    build: ./bookstore
    container_name: bookstore
    restart: unless-stopped
    environment:
      - PORT=8082
      - GATEWAY_URL=${GATEWAY_URL}
    ports:
      - "8082:8082"
    depends_on:
      - api-gateway
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  mongo-data:
